services:
  - type: web
    name: alufran-fin-api
    env: dotnet
    region: sfo
    plan: free
    buildCommand: dotnet publish -c Release -o out AlufranFinConsole.Api/AlufranFinConsole.Api.csproj
    startCommand: cd out && dotnet AlufranFinConsole.Api.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Jwt__Key
        value: AlufranConsoleChaveSeguraMinimo32CaracteresObrigatorio2026
      - key: Jwt__Issuer
        value: AlufranConsole
      - key: Jwt__Audience
        value: AlufranConsoleApp
      - key: Jwt__ExpireMinutes
        value: "480"
      - key: ASPNETCORE_URLS
        value: http://+:10000
